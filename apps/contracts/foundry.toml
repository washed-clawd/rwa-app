[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

# Compiler settings
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

# Foundry remappings (populated in remappings.txt)
remappings = ["@openzeppelin/=lib/openzeppelin-contracts/", "@morpho/=lib/morpho-blue/"]

# RPC endpoints (use env vars)
[rpc_endpoints]
base = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
localhost = "http://127.0.0.1:8545"

# Etherscan config for verification
[etherscan]
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }

# Gas reporter
[profile.ci]
gas_reports = ["RWAVault", "MorphoMarketFactory", "OracleAdapter"]
